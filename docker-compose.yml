version: "3.8"

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped

    # futtassuk nem-rootként (a .env-ből jön a 1000:1000)
    user: "${JENKINS_UID:-1000}:${JENKINS_GID:-1000}"

    ports:
      - "8080:8080"
      - "50000:50000"

    environment:
      - JAVA_OPTS=-Duser.timezone=Europe/Budapest
      - JENKINS_OPTS=--prefix=/

    volumes:
      # a régi, megőrzött jenkins_home volume-od
      - jenkins_home:/var/jenkins_home
      # kubeconfig a hostról (Windows alatt ez a .env-ben lévő path)
      - ${KUBECONFIG_HOST}:/var/jenkins_home/.kube:ro
      # docker socket a hostról
      - /var/run/docker.sock:/var/run/docker.sock

    # tedd be a host docker gid-jét, hogy a socket elérhető legyen
    group_add:
      - "${DOCKER_GID}"

volumes:
  jenkins_home:
    external: true
    name: a99f401ebb8288d6c00479ef2ba478a50d1c38128b6aa8370e48b2d4c4cacb9d
