version: "3.8"

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - JAVA_OPTS=-Duser.timezone=Europe/Budapest -Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--prefix=/
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE:-~}/.kube:/var/jenkins_home/.kube:ro
