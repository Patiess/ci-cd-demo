version: "3.8"

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped

    # futtatás nem-root userként (UID/GID az .env-ből)
    user: "${JENKINS_UID:-1000}:${JENKINS_GID:-1000}"

    environment:
      - JAVA_OPTS=-Duser.timezone=Europe/Budapest
      - JENKINS_OPTS=--prefix=/

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      # ÁLLANDÓ JENKINS HOME – a meglévő named volume-odra mutat
      - jenkins_home:/var/jenkins_home

      # Kubeconfig mount Windows alatt (//c/... formátum kötelező)
      # Ha e miatt hiba jön, IDEIGLENESEN KOMMENTELD KI ezt a sort.
      - "${KUBECONFIG_HOST}:/var/jenkins_home/.kube:ro"

      # Docker socket a hostról (Jenkinsből tudjunk buildelni)
      - /var/run/docker.sock:/var/run/docker.sock

    # Ha a docker.sock csoportja nem 0, itt megadható a GID
    group_add:
      - "${DOCKER_GID:-0}"

volumes:
  jenkins_home:
    external: true
    name: jenkins_home
